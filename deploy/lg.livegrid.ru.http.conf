# lg.livegrid.ru — separate vhost (does not modify other sites)

server {
    listen 80;
    listen [::]:80;
    server_name lg.livegrid.ru;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    root /var/www/lg/public;
    index index.html index.php;

    access_log /var/log/nginx/lg.livegrid.ru.access.log;
    error_log  /var/log/nginx/lg.livegrid.ru.error.log warn;

    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;
    gzip_min_length 256;

    client_max_body_size 20M;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
    }

    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
