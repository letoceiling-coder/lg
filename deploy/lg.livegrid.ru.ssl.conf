# lg.livegrid.ru — HTTPS + API (NestJS) + публичный фронт (Vite SPA из apps/web)
# Сертификат: /etc/letsencrypt/live/lg.livegrid.ru/

server {
    listen 80;
    listen [::]:80;
    server_name lg.livegrid.ru;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name lg.livegrid.ru;

    ssl_certificate     /etc/letsencrypt/live/lg.livegrid.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lg.livegrid.ru/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Frame-Options           "SAMEORIGIN"    always;
    add_header X-Content-Type-Options    "nosniff"       always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    access_log /var/log/nginx/lg.livegrid.ru.access.log;
    error_log  /var/log/nginx/lg.livegrid.ru.error.log warn;

    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;
    gzip_min_length 256;

    client_max_body_size 20M;
    keepalive_timeout    65;

    # --- API (NestJS, PM2 порт 3000) ---
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # --- Swagger ---
    location /docs {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Публичный фронт (@lg/web): pnpm build:web → rsync dist на сервер ---
    location / {
        root /var/www/lg/apps/web/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
